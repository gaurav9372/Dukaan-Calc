<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dukaan Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <main>
      <section class="screen active" data-screen="home">
        <h1>Dukaan Calculator</h1>
        <p class="subtitle">Choose a mini calculator to get started.</p>
        <div class="menu">
          <button class="menu-card" data-go="discount">
            <div>
              <span class="menu-title">Discount Calculator</span>
              <span class="menu-desc">Quickly apply discounts to any price.</span>
            </div>
            <span class="menu-arrow">→</span>
          </button>
          <button class="menu-card" data-go="breakdown">
            <div>
              <span class="menu-title">Price Breakdown</span>
              <span class="menu-desc">Find cost per kg or unit.</span>
            </div>
            <span class="menu-arrow">→</span>
          </button>
          <button class="menu-card accent" data-go="fertilizer">
            <div>
              <span class="menu-title">Fertilizer Price Calculator</span>
              <span class="menu-desc">Sum multiple products in seconds.</span>
            </div>
            <span class="menu-arrow">→</span>
          </button>
        </div>
      </section>

      <section class="screen calc" data-screen="discount">
        <div class="screen-header">
          <button class="back" data-back aria-label="Back">
            <img class="back-icon" src="Icons/back.svg" alt="" />
          </button>
          <h2>Discount Calculator</h2>
        </div>

        <div class="screen-body">
          <div class="card minimal">
            <label class="field">
              <span>Price</span>
              <div class="input-group">
              <input type="text" id="discount-price" value="0" readonly inputmode="none" data-number />
                <span class="unit">₹</span>
              </div>
            </label>

          <label class="field">
            <span>Discount</span>
            <div class="input-group">
              <input type="text" id="discount-rate" value="0" readonly inputmode="none" data-number />
              <span class="unit">%</span>
            </div>
            <span class="field-hint" id="discount-amount">Discount Amount: ₹0</span>
          </label>
        </div>
        </div>

        <div class="screen-footer">
          <div class="footer-row">
            <div class="result">
              <label class="result-label" for="discount-result">New Price</label>
              <div class="input-group output">
                <input type="text" id="discount-result" readonly />
                <span class="unit">₹</span>
              </div>
            </div>

            <button class="reset" data-reset="discount">Reset</button>
          </div>
        </div>
      </section>

      <section class="screen calc" data-screen="breakdown">
        <div class="screen-header">
          <button class="back" data-back aria-label="Back">
            <img class="back-icon" src="Icons/back.svg" alt="" />
          </button>
          <h2>Price Breakdown</h2>
        </div>

        <div class="screen-body">
          <div class="card minimal">
            <label class="field">
              <span>Price</span>
              <div class="input-group">
              <input type="text" id="breakdown-price" value="0" readonly inputmode="none" data-number />
                <span class="unit">₹</span>
              </div>
            </label>

            <label class="field">
              <span>Weight</span>
              <div class="input-group">
              <input type="text" id="breakdown-weight" value="0" readonly inputmode="none" data-number />
                <span class="unit">Kg</span>
              </div>
            </label>
          </div>
        </div>

        <div class="screen-footer">
          <div class="footer-row">
            <div class="result">
              <label class="result-label" for="breakdown-result">Price / Kg</label>
              <div class="input-group output">
                <input type="text" id="breakdown-result" readonly />
                <span class="unit">₹</span>
              </div>
            </div>

            <button class="reset" data-reset="breakdown">Reset</button>
          </div>
        </div>
      </section>

      <section class="screen calc" data-screen="fertilizer">
        <div class="screen-header">
          <button class="back" data-back aria-label="Back">
            <img class="back-icon" src="Icons/back.svg" alt="" />
          </button>
          <h2>Fertilizer Price Calculator</h2>
        </div>

        <div class="screen-body">
          <div class="product-list" id="product-list">
            <!-- Products inserted by JS -->
          </div>

          <button class="ghost" id="add-product">Add Product</button>
        </div>

        <div class="screen-footer">
          <div class="footer-row">
            <div class="result">
              <label class="result-label" for="fertilizer-total">Total Price</label>
              <div class="input-group output">
                <input type="text" id="fertilizer-total" readonly />
                <span class="unit">₹</span>
              </div>
            </div>

            <button class="reset" data-reset="fertilizer">Reset</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="keyboard" id="keyboard" aria-hidden="true">
    <div class="keyboard-grid">
      <button class="key" data-key="1">1</button>
      <button class="key" data-key="2">2</button>
      <button class="key" data-key="3">3</button>
      <div class="key spacer" aria-hidden="true"></div>

      <button class="key" data-key="4">4</button>
      <button class="key" data-key="5">5</button>
      <button class="key" data-key="6">6</button>
      <div class="key spacer" aria-hidden="true"></div>

      <button class="key" data-key="7">7</button>
      <button class="key" data-key="8">8</button>
      <button class="key" data-key="9">9</button>
      <button class="key key-danger" data-key="backspace" aria-label="Backspace">
        <img class="key-icon" src="Icons/backspace.svg" alt="" />
      </button>

      <div class="key spacer" aria-hidden="true"></div>
      <button class="key" data-key="0">0</button>
      <button class="key" data-key=".">.</button>
      <button class="key key-primary" data-key="enter" aria-label="Done">
        <img class="key-icon" src="Icons/enter.svg" alt="" />
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
